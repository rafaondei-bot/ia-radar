<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>IA Radar — Rafael Ondei</title>
<meta name="description" content="Radar diário do mercado de IA. 10 informações mais relevantes, atualizado às 7h." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --verde: #16a34a;
    --verde-claro: #22c55e;
    --laranja: #ea580c;
    --amarelo: #facc15;
    --preto: #0a0a0a;
    --preto-2: #0d0d0d;
    --cinza-900: #18181b;
    --cinza-800: #27272a;
    --cinza-700: #3f3f46;
    --cinza-400: #a1a1aa;
    --cinza-300: #d4d4d8;
    --branco: #fafafa;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--preto);
    color: var(--branco);
    line-height: 1.55;
    min-height: 100vh;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 20px 80px;
  }

  /* HEADER */
  header {
    border-bottom: 1px solid var(--cinza-800);
    padding-bottom: 24px;
    margin-bottom: 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
  }

  .brand h1 {
    font-size: clamp(1.6rem, 3vw, 2.2rem);
    font-weight: 900;
    letter-spacing: -0.025em;
    line-height: 1.1;
  }

  .brand h1 .accent { color: var(--verde-claro); }

  .brand p {
    color: var(--cinza-400);
    font-size: 0.92rem;
    margin-top: 4px;
  }

  .last-update {
    font-size: 0.85rem;
    color: var(--cinza-400);
    background: var(--cinza-900);
    border: 1px solid var(--cinza-800);
    padding: 8px 14px;
    border-radius: 100px;
  }

  .last-update strong { color: var(--verde-claro); }

  /* SEARCH BAR */
  .search-bar { margin-bottom: 24px; }
  .search-bar form { display: flex; gap: 10px; }
  .search-bar input {
    flex: 1; background: var(--cinza-900); border: 1px solid var(--cinza-800);
    border-radius: 100px; padding: 14px 22px; color: var(--branco);
    font-family: inherit; font-size: 0.95rem; outline: none; transition: border-color 0.15s;
  }
  .search-bar input:focus { border-color: var(--verde-claro); }
  .search-bar input::placeholder { color: var(--cinza-400); }
  .search-bar button {
    background: var(--amarelo); color: var(--preto); border: none; border-radius: 100px;
    padding: 14px 28px; font-family: inherit; font-size: 0.9rem; font-weight: 800;
    letter-spacing: 0.04em; text-transform: uppercase; cursor: pointer; transition: background 0.15s;
  }
  .search-bar button:hover { background: #fde047; }
  .search-bar button:disabled { opacity: 0.5; cursor: wait; }
  .search-hint { font-size: 0.78rem; color: var(--cinza-400); margin-top: 8px; padding-left: 22px; }
  .search-status {
    margin-top: 14px; padding: 12px 18px;
    background: rgba(22,163,74,0.1); border-left: 3px solid var(--verde-claro);
    border-radius: 0 10px 10px 0; font-size: 0.92rem; color: var(--branco);
  }
  .search-status.error { background: rgba(234,88,12,0.1); border-left-color: var(--laranja); }

  /* TABS */
  .tabs {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 12px;
    margin-bottom: 24px;
    border-bottom: 1px solid var(--cinza-800);
    scrollbar-width: thin;
  }

  .tab {
    flex-shrink: 0;
    background: transparent;
    border: 1px solid var(--cinza-800);
    color: var(--cinza-300);
    font-family: inherit;
    font-size: 0.88rem;
    font-weight: 600;
    padding: 10px 18px;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .tab:hover { border-color: var(--verde); color: var(--branco); }

  .tab.active {
    background: var(--verde);
    color: var(--branco);
    border-color: var(--verde);
  }

  /* CONTENT */
  .empty-state {
    text-align: center;
    padding: 80px 24px;
    border: 1px dashed var(--cinza-700);
    border-radius: 16px;
    color: var(--cinza-400);
  }

  .empty-state h2 {
    font-size: 1.4rem;
    color: var(--branco);
    margin-bottom: 8px;
    font-weight: 700;
  }

  .empty-state p { font-size: 0.95rem; line-height: 1.6; }

  .empty-state .badge {
    display: inline-block;
    background: rgba(22,163,74,0.15);
    color: var(--verde-claro);
    border: 1px solid rgba(22,163,74,0.3);
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 100px;
    margin-bottom: 16px;
  }

  .day-meta {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .day-meta h2 {
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: -0.02em;
  }

  .pill {
    background: var(--cinza-900);
    border: 1px solid var(--cinza-800);
    padding: 4px 12px;
    border-radius: 100px;
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--cinza-400);
  }

  .pill.green { color: var(--verde-claro); border-color: rgba(22,163,74,0.4); }
  .pill.orange { color: var(--laranja); border-color: rgba(234,88,12,0.4); }

  /* NEWS LIST */
  .news-list {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 36px;
  }

  .news-item {
    background: var(--cinza-900);
    border: 1px solid var(--cinza-800);
    border-radius: 14px;
    padding: 22px 22px;
    transition: border-color 0.15s, transform 0.15s;
  }

  .news-item:hover {
    border-color: var(--verde);
    transform: translateY(-1px);
  }

  .news-item .num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--verde-claro);
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }

  .news-item h3 {
    font-size: 1.12rem;
    font-weight: 700;
    line-height: 1.35;
    margin-bottom: 8px;
    letter-spacing: -0.01em;
  }

  .news-item .summary {
    color: var(--cinza-300);
    font-size: 0.95rem;
    line-height: 1.55;
    margin-bottom: 14px;
  }

  .news-item .meta {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
    font-size: 0.78rem;
  }

  .meta .source {
    background: var(--cinza-800);
    color: var(--cinza-300);
    padding: 4px 10px;
    border-radius: 100px;
    font-weight: 600;
  }

  .meta .category {
    background: rgba(22,163,74,0.12);
    color: var(--verde-claro);
    padding: 4px 10px;
    border-radius: 100px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .meta .link {
    color: var(--amarelo);
    text-decoration: none;
    font-weight: 600;
    margin-left: auto;
  }

  .meta .link:hover { text-decoration: underline; }

  /* RECOMMENDED BADGE + ACTION */
  .news-item.recommended {
    border-color: rgba(234,88,12,0.5);
    background: linear-gradient(180deg, rgba(234,88,12,0.04) 0%, var(--cinza-900) 60%);
    box-shadow: 0 0 0 1px rgba(234,88,12,0.08);
  }
  .rec-badge {
    display: inline-block;
    background: var(--laranja);
    color: var(--branco);
    font-size: 0.7rem;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 100px;
    margin-left: 8px;
    vertical-align: middle;
  }
  .rec-cta {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px dashed var(--cinza-800);
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  .rec-cta .gen-btn {
    background: var(--amarelo);
    color: var(--preto);
    font-weight: 800;
    font-size: 0.85rem;
    padding: 9px 18px;
    border: none;
    border-radius: 100px;
    cursor: pointer;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    font-family: inherit;
  }
  .rec-cta .gen-btn:hover { background: #fde047; }
  .rec-cta .theme {
    font-size: 0.85rem;
    color: var(--cinza-400);
    font-style: italic;
  }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    backdrop-filter: blur(8px);
    display: none; align-items: flex-start; justify-content: center;
    padding: 40px 16px; z-index: 100; overflow-y: auto;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--cinza-900);
    border: 1px solid var(--cinza-800);
    border-radius: 18px;
    max-width: 880px;
    width: 100%;
    padding: 28px 24px 32px;
    position: relative;
    margin: auto 0;
  }
  .modal-close {
    position: absolute; top: 14px; right: 18px;
    background: transparent; border: none; color: var(--cinza-400);
    font-size: 2rem; cursor: pointer; line-height: 1; padding: 4px 10px;
  }
  .modal-close:hover { color: var(--branco); }
  .modal h3 {
    font-size: 1.2rem; font-weight: 800; margin-bottom: 6px; padding-right: 40px;
  }
  .modal .source-link {
    font-size: 0.85rem; color: var(--amarelo); text-decoration: none;
    margin-bottom: 16px; display: inline-block;
  }
  .modal .theme-line {
    background: rgba(22,163,74,0.1);
    border-left: 3px solid var(--verde-claro);
    padding: 12px 14px;
    border-radius: 0 8px 8px 0;
    color: var(--cinza-300);
    font-size: 0.92rem;
    margin: 14px 0 22px;
  }
  .preview-cover {
    width: 100%;
    max-width: 540px;
    margin: 0 auto;
    display: block;
    border-radius: 14px;
    border: 1px solid var(--cinza-800);
    aspect-ratio: 4/5;
    object-fit: cover;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
  }
  .modal-actions {
    display: flex; gap: 12px; justify-content: center; margin-top: 22px;
    flex-wrap: wrap;
  }
  .btn-primary, .btn-secondary {
    font-family: inherit; font-weight: 800; font-size: 0.92rem;
    padding: 12px 24px; border-radius: 100px; border: none; cursor: pointer;
    letter-spacing: 0.04em; text-transform: uppercase;
  }
  .btn-primary { background: var(--verde-claro); color: var(--branco); }
  .btn-primary:hover { background: #16a34a; }
  .btn-secondary { background: var(--cinza-800); color: var(--cinza-300); }
  .btn-secondary:hover { background: var(--cinza-700); color: var(--branco); }
  .btn-link {
    background: transparent; color: var(--amarelo); border: 1px solid var(--amarelo);
  }
  .btn-link:hover { background: var(--amarelo); color: var(--preto); }

  .gallery {
    display: grid; gap: 14px; margin-top: 22px;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  }
  .gallery .slide-card {
    display: flex; flex-direction: column; gap: 8px;
    border-radius: 10px; padding: 6px; background: var(--cinza-900);
    border: 1px solid var(--cinza-800);
  }
  .gallery .slide-card.edited {
    border-color: var(--verde-claro);
    box-shadow: 0 0 0 1px rgba(34,197,94,0.2);
  }
  .gallery .slide-card .thumb-frame {
    width: 100%; aspect-ratio: 4/5; border-radius: 8px; overflow: hidden;
    background: #000; position: relative;
  }
  .gallery .slide-card .thumb-frame iframe {
    width: 1080px; height: 1350px; border: none;
    transform: scale(calc(var(--thumb-w, 220px) / 1080));
    transform-origin: top left;
    pointer-events: none;
  }
  .gallery .slide-card img {
    width: 100%; aspect-ratio: 4/5;
    border-radius: 8px; background: #000;
    object-fit: cover; display: block;
  }
  .gallery .slide-card .slide-actions {
    display: flex; gap: 6px;
  }
  .gallery .slide-card .slide-actions button {
    flex: 1; font-family: inherit; font-size: 0.72rem; font-weight: 700;
    padding: 7px 8px; border-radius: 6px; border: none; cursor: pointer;
    letter-spacing: 0.04em; text-transform: uppercase;
  }
  .gallery .slide-card .btn-edit { background: var(--cinza-800); color: var(--cinza-300); }
  .gallery .slide-card .btn-edit:hover { background: var(--verde); color: var(--branco); }
  .gallery .slide-card .btn-download { background: var(--amarelo); color: var(--preto); }
  .gallery .slide-card .btn-download:hover { background: #fde047; }
  .gallery .slide-card .edited-tag {
    font-size: 0.65rem; color: var(--verde-claro); font-weight: 700;
    text-align: center; padding: 2px 0; letter-spacing: 0.08em; text-transform: uppercase;
  }

  /* EDITOR PANEL */
  .editor-panel {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: 100%; max-width: 480px;
    background: var(--cinza-900);
    border-left: 1px solid var(--cinza-800);
    box-shadow: -10px 0 40px rgba(0,0,0,0.6);
    z-index: 200; padding: 24px 22px;
    overflow-y: auto; display: none;
  }
  .editor-panel.open { display: block; }
  .editor-panel h3 {
    font-size: 1.1rem; font-weight: 800; margin-bottom: 4px; padding-right: 40px;
  }
  .editor-panel .subtitle {
    color: var(--cinza-400); font-size: 0.85rem; margin-bottom: 18px;
  }
  .editor-panel .ed-close {
    position: absolute; top: 14px; right: 16px;
    background: transparent; border: none; color: var(--cinza-400);
    font-size: 1.8rem; cursor: pointer; line-height: 1;
  }
  .editor-panel .ed-close:hover { color: var(--branco); }

  .editor-panel .preview-wrap {
    width: 100%; aspect-ratio: 4/5; border-radius: 10px;
    overflow: hidden; border: 1px solid var(--cinza-800); margin-bottom: 18px;
    background: #000; position: relative;
  }
  .editor-panel .preview-wrap iframe {
    width: 1080px; height: 1350px; border: none; background: transparent;
    transform-origin: top left;
    position: absolute; top: 0; left: 0;
  }

  .ed-section { margin-bottom: 18px; }
  .ed-section h4 {
    font-size: 0.72rem; font-weight: 800; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--verde-claro); margin-bottom: 10px;
  }
  .ed-field { margin-bottom: 12px; }
  .ed-field label {
    display: block; font-size: 0.78rem; font-weight: 600;
    color: var(--cinza-300); margin-bottom: 5px;
  }
  .ed-field input[type=text],
  .ed-field textarea {
    width: 100%; background: #070e09;
    border: 1px solid var(--cinza-800); border-radius: 8px;
    padding: 9px 12px; color: var(--branco);
    font-family: inherit; font-size: 0.88rem;
    outline: none; transition: border-color 0.15s;
  }
  .ed-field input[type=text]:focus,
  .ed-field textarea:focus { border-color: var(--verde-claro); }
  .ed-field textarea { resize: vertical; min-height: 70px; }

  .color-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
  }
  .color-grid .color-item {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
  }
  .color-grid input[type=color] {
    width: 100%; height: 36px; border: 1px solid var(--cinza-800);
    border-radius: 8px; cursor: pointer; background: transparent; padding: 2px;
  }
  .color-grid label { font-size: 0.66rem; color: var(--cinza-400); text-align: center; line-height: 1.1; }

  .size-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .size-grid button {
    background: var(--cinza-800); color: var(--cinza-300);
    border: 1px solid var(--cinza-700);
    font-family: inherit; font-size: 0.78rem; font-weight: 700;
    padding: 9px 8px; border-radius: 8px; cursor: pointer;
  }
  .size-grid button.active {
    background: var(--verde-claro); color: var(--branco); border-color: var(--verde-claro);
  }

  .editor-panel .ed-actions {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 22px;
  }
  .ed-actions button {
    font-family: inherit; font-weight: 800; font-size: 0.82rem;
    padding: 12px 14px; border-radius: 10px; border: none; cursor: pointer;
    letter-spacing: 0.04em; text-transform: uppercase;
  }
  .ed-save { background: var(--verde-claro); color: var(--branco); grid-column: 1 / -1; }
  .ed-save:hover { background: var(--verde); }
  .ed-download-act { background: var(--amarelo); color: var(--preto); }
  .ed-reset { background: var(--cinza-800); color: var(--cinza-300); }
  .ed-reset:hover { background: var(--cinza-700); color: var(--branco); }

  .caption-block {
    margin-top: 22px; padding: 16px 18px; background: var(--preto-2);
    border: 1px solid var(--cinza-800); border-radius: 10px;
  }
  .caption-block .label {
    font-size: 0.75rem; font-weight: 800; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--verde-claro); margin-bottom: 8px;
  }
  .caption-block pre {
    font-family: inherit; font-size: 0.88rem; line-height: 1.55;
    color: var(--cinza-300); white-space: pre-wrap; word-wrap: break-word;
  }
  .caption-block .copy-cap {
    margin-top: 10px; background: var(--amarelo); color: var(--preto);
    border: none; padding: 6px 14px; border-radius: 100px; font-weight: 800;
    font-size: 0.78rem; cursor: pointer; letter-spacing: 0.04em; text-transform: uppercase;
    font-family: inherit;
  }

  /* OUTPUTS (WhatsApp, Instagram) */
  .outputs {
    display: grid;
    gap: 20px;
    grid-template-columns: 1fr;
    margin-top: 40px;
  }

  @media (min-width: 760px) {
    .outputs { grid-template-columns: 1fr 1fr; }
  }

  .output-block {
    background: var(--cinza-900);
    border: 1px solid var(--cinza-800);
    border-radius: 14px;
    padding: 22px;
    display: flex;
    flex-direction: column;
  }

  .output-block .label {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .output-block .label .title {
    font-weight: 800;
    font-size: 0.85rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--verde-claro);
  }

  .output-block .copy-btn {
    background: var(--amarelo);
    color: var(--preto);
    font-weight: 800;
    font-size: 0.78rem;
    padding: 6px 14px;
    border: none;
    border-radius: 100px;
    cursor: pointer;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    transition: background 0.15s;
  }

  .output-block .copy-btn:hover { background: #fde047; }
  .output-block .copy-btn.copied { background: var(--verde-claro); color: var(--branco); }

  .output-block pre {
    font-family: 'Inter', sans-serif;
    font-size: 0.92rem;
    line-height: 1.65;
    color: var(--cinza-300);
    background: var(--preto-2);
    border: 1px solid var(--cinza-800);
    border-radius: 10px;
    padding: 16px 18px;
    white-space: pre-wrap;
    word-wrap: break-word;
    flex: 1;
    max-height: 520px;
    overflow-y: auto;
  }

  /* FOOTER */
  footer {
    margin-top: 60px;
    padding-top: 24px;
    border-top: 1px solid var(--cinza-800);
    color: var(--cinza-400);
    font-size: 0.82rem;
    text-align: center;
    line-height: 1.6;
  }

  footer a { color: var(--verde-claro); text-decoration: none; }
  footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
  <div class="container">

    <header>
      <div class="brand">
        <h1>IA <span class="accent">Radar</span></h1>
        <p>Top 10 do mercado · atualizado todo dia 7h (BRT) · pesquisa por nicho on-demand</p>
      </div>
      <div class="last-update" id="lastUpdate">Carregando…</div>
    </header>

    <div class="search-bar">
      <form id="searchForm" autocomplete="off">
        <input type="text" id="searchInput" name="topic"
          placeholder="🔎 Pesquisar 10 notícias sobre outro nicho (ex: marketing digital, energia solar, criptomoedas)"
          maxlength="80" required />
        <button type="submit" id="searchBtn">Pesquisar</button>
      </form>
      <div class="search-hint">Tempo médio: ~25 min. O resultado vira aba nova quando concluir.</div>
      <div class="search-status" id="searchStatus" style="display:none;"></div>
    </div>

    <div class="tabs" id="tabs"></div>

    <div id="content"></div>

    <footer>
      Curadoria automática · feita por <a href="https://github.com/rafaondei-bot/ia-radar">rafaondei-bot/ia-radar</a> · Rafael Ondei
    </footer>
  </div>

  <div class="modal-overlay" id="modal" aria-hidden="true"></div>
  <aside class="editor-panel" id="editor-panel" aria-hidden="true"></aside>
  <script src="slide-renderer.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <script>
    const WORKER_URL = "https://ia-radar-trigger.dendersonai.workers.dev"; // PROVISIONAL — ajustar pós-deploy
    const STATE = { executions: [], current: null, polling: null };

    function fmtDate(iso) {
      try {
        const d = new Date(iso);
        return d.toLocaleString('pt-BR', {
          day: '2-digit', month: '2-digit', year: 'numeric',
          hour: '2-digit', minute: '2-digit'
        });
      } catch { return iso; }
    }

    function fmtTabLabel(exec) {
      const date = (typeof exec === 'string') ? exec : exec.date;
      const topic = (typeof exec === 'object') ? exec.topic : null;
      const d = new Date(date + 'T00:00:00-03:00');
      const dateLabel = d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' }).replace('.', '');
      if (topic && topic !== 'mercado de IA') {
        const tShort = topic.length > 18 ? topic.slice(0, 17) + '…' : topic;
        return `${dateLabel} · ${tShort}`;
      }
      return `${dateLabel} · IA`;
    }
    function execKey(exec) { return exec.key || exec.date; }

    async function loadIndex(autoSelectKey) {
      const res = await fetch('data/index.json?_=' + Date.now());
      const json = await res.json();
      STATE.executions = json.executions || [];
      document.getElementById('lastUpdate').innerHTML = json.updated_at
        ? `Última atualização: <strong>${fmtDate(json.updated_at)}</strong>`
        : 'Nenhuma execução ainda';
      renderTabs();
      if (STATE.executions.length) {
        const target = autoSelectKey
          ? (STATE.executions.find(e => execKey(e) === autoSelectKey) || STATE.executions[0])
          : STATE.executions[0];
        await selectExecution(execKey(target));
      } else {
        renderEmpty();
      }
    }

    function renderTabs() {
      const tabs = document.getElementById('tabs');
      tabs.style.display = '';
      if (!STATE.executions.length) { tabs.style.display = 'none'; return; }
      tabs.innerHTML = STATE.executions.map(e =>
        `<button class="tab" data-key="${execKey(e)}">${fmtTabLabel(e)}</button>`
      ).join('');
      tabs.querySelectorAll('.tab').forEach(btn => {
        btn.addEventListener('click', () => selectExecution(btn.dataset.key));
      });
    }

    function renderEmpty() {
      document.getElementById('content').innerHTML = `
        <div class="empty-state">
          <span class="badge">Aguardando primeira execução</span>
          <h2>O radar ainda não rodou hoje</h2>
          <p>A primeira pesquisa vai cair aqui em alguns minutos.<br>Volta logo.</p>
        </div>
      `;
    }

    async function selectExecution(key) {
      STATE.current = key;
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.key === key));
      const res = await fetch(`data/${key}.json?_=` + Date.now());
      if (!res.ok) {
        document.getElementById('content').innerHTML = `<div class="empty-state"><h2>Não consegui carregar ${key}</h2><p>Pode ser que ainda esteja sendo processado.</p></div>`;
        return;
      }
      const data = await res.json();
      if (!data.key) data.key = key;
      renderExecution(data);
    }

    function escapeHtml(s) {
      return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function renderExecution(data) {
      const key = data.key || data.date;
      const newsHtml = (data.items || []).map((it, i) => {
        const isRec = !!it.recommended;
        const hasCarousel = !!(it.carousel && it.carousel.slides && it.carousel.slides.length);
        const carouselNum = i + 1; // numeração igual ao índice 1-based do item no array
        return `
        <div class="news-item ${isRec ? 'recommended' : ''}">
          <div class="num">#${String(i+1).padStart(2,'0')}${isRec ? '<span class="rec-badge">🔥 Recomendado pra viralizar</span>' : ''}</div>
          <h3>${escapeHtml(it.title)}</h3>
          <p class="summary">${escapeHtml(it.summary)}</p>
          <div class="meta">
            <span class="source">${escapeHtml(it.source || '—')}</span>
            ${it.category ? `<span class="category">${escapeHtml(it.category)}</span>` : ''}
            ${it.link ? `<a href="${escapeHtml(it.link)}" target="_blank" rel="noopener" class="link">Ler na fonte ↗</a>` : ''}
          </div>
          ${hasCarousel ? `
            <div class="rec-cta">
              <button class="gen-btn" data-action="open-carousel" data-carousel="${carouselNum}" data-index="${i}">📸 Gerar carrossel</button>
              <span class="theme">Tema: ${escapeHtml(it.carousel.theme || '—')}</span>
            </div>
          ` : ''}
        </div>
        `;
      }).join('');

      document.getElementById('content').innerHTML = `
        <div class="day-meta">
          <h2>${fmtTabLabel(data)}</h2>
          <span class="pill green">${(data.items || []).length} itens</span>
          <span class="pill">Gerado ${fmtDate(data.generated_at)}</span>
        </div>

        <div class="news-list">${newsHtml || '<p>Sem itens.</p>'}</div>

        <div class="outputs">
          <div class="output-block">
            <div class="label">
              <span class="title">📲 WhatsApp / Comunidade</span>
              <button class="copy-btn" data-copy="wa">Copiar</button>
            </div>
            <pre id="out-wa">${escapeHtml(data.whatsapp || '')}</pre>
          </div>

          <div class="output-block">
            <div class="label">
              <span class="title">📸 Instagram</span>
              <button class="copy-btn" data-copy="ig">Copiar</button>
            </div>
            <pre id="out-ig">${escapeHtml(data.instagram || '')}</pre>
          </div>
        </div>
      `;

      document.querySelectorAll('.copy-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = btn.dataset.copy === 'wa' ? 'out-wa' : 'out-ig';
          const text = document.getElementById(id).textContent;
          navigator.clipboard.writeText(text).then(() => {
            btn.classList.add('copied');
            const original = btn.textContent;
            btn.textContent = 'Copiado ✓';
            setTimeout(() => { btn.classList.remove('copied'); btn.textContent = original; }, 1500);
          });
        });
      });

      // Carousel buttons
      document.querySelectorAll('[data-action="open-carousel"]').forEach(btn => {
        btn.addEventListener('click', () => {
          const carouselNum = parseInt(btn.dataset.carousel, 10);
          const itemIdx = parseInt(btn.dataset.index, 10);
          openCarouselModal(key, data.items[itemIdx], carouselNum);
        });
      });
    }

    function openCarouselModal(date, item, carouselNum) {
      const carousel = item.carousel || {};
      const slides = carousel.slides || [];
      const slidesHtml = slides.map(s => `
        <div style="margin-bottom: 12px; padding: 10px 12px; background: rgba(255,255,255,0.03); border-radius: 8px; font-size: 0.85rem; color: #d4d4d8;">
          <strong style="color: #22c55e;">Slide ${s.n} (${escapeHtml(s.kind || '')}):</strong>
          ${s.eyebrow ? `<div style="font-size: 0.75rem; color: #facc15; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 4px;">${escapeHtml(s.eyebrow)}</div>` : ''}
          <div style="font-weight: 700; color: #fafafa; margin: 4px 0;">${escapeHtml(s.title || '')}</div>
          ${s.body ? `<div style="font-size: 0.8rem; color: #a1a1aa;">${escapeHtml(s.body)}</div>` : ''}
          ${s.stat ? `<div style="margin-top: 4px; font-size: 0.78rem; color: #facc15;"><strong>📊 ${escapeHtml(s.stat)}${s.stat_label ? ' — ' + escapeHtml(s.stat_label) : ''}</strong></div>` : ''}
        </div>
      `).join('');

      const coverUrl = `data/carrosseis/${date}/c${carouselNum}-s01.png`;

      const modal = document.getElementById('modal');
      modal.innerHTML = `
        <div class="modal">
          <button class="modal-close" data-close>&times;</button>
          <h3>📸 Carrossel ${carouselNum}: ${escapeHtml(item.title)}</h3>
          ${item.link ? `<a href="${escapeHtml(item.link)}" target="_blank" rel="noopener" class="source-link">↗ Ler na fonte: ${escapeHtml(item.source || '')}</a>` : ''}
          <div class="theme-line"><strong>Tema:</strong> ${escapeHtml(carousel.theme || '—')}</div>

          <div id="modal-cover-stage">
            <img src="${coverUrl}" alt="Capa do carrossel" class="preview-cover" onerror="this.parentElement.innerHTML='<div style=&quot;text-align:center;padding:40px;color:#a1a1aa;&quot;>Imagens ainda em geração — confere de novo em alguns minutos.</div>'" />
            <div class="modal-actions">
              <button class="btn-primary" data-action="approve" data-carousel="${carouselNum}">✓ Gerar carrossel completo</button>
              <button class="btn-secondary" data-close>Cancelar</button>
            </div>
            <div style="margin-top: 28px;">
              <h4 style="font-size: 0.85rem; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; color: #22c55e; margin-bottom: 12px;">Roteiro proposto</h4>
              ${slidesHtml}
            </div>
          </div>

          <div id="modal-full-stage" style="display:none;">
            <div class="gallery"></div>
            <div class="caption-block">
              <div class="label">📝 Caption do post</div>
              <pre id="modal-caption"></pre>
              <button class="copy-cap" data-copy-caption>Copiar caption</button>
            </div>
            <div class="modal-actions">
              <a class="btn-link" id="zip-link" href="#" download>⬇ Baixar todos slides</a>
              <button class="btn-secondary" data-close>Fechar</button>
            </div>
          </div>
        </div>
      `;
      modal.classList.add('open');

      modal.querySelectorAll('[data-close]').forEach(b => b.addEventListener('click', closeModal));
      modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
      const approveBtn = modal.querySelector('[data-action="approve"]');
      if (approveBtn) approveBtn.addEventListener('click', () => revealFull(date, item, carouselNum));
    }

    function revealFull(date, item, carouselNum) {
      const carousel = item.carousel || {};
      const slides = carousel.slides || [];
      const total = slides.length;

      const galleryHtml = slides.map((slide, i) => {
        const n = String(i + 1).padStart(2, '0');
        const slideKey = `${date}::c${carouselNum}::s${n}`;
        const overrides = getOverrides(slideKey);
        const isEdited = !!overrides;
        const previewBlock = isEdited
          ? `<div class="thumb-frame"><iframe sandbox="allow-same-origin" srcdoc="${escapeHtml(window.SlideRenderer.renderSlideHTML(carousel, slide, i + 1, total, overrides))}" loading="lazy"></iframe></div>`
          : `<img src="data/carrosseis/${date}/c${carouselNum}-s${n}.png" alt="Slide ${i+1}" data-slide-img onerror="this.style.opacity=0.3" />`;
        return `
          <div class="slide-card ${isEdited ? 'edited' : ''}" data-slide-key="${slideKey}">
            ${previewBlock}
            ${isEdited ? '<div class="edited-tag">✓ Editado</div>' : ''}
            <div class="slide-actions">
              <button class="btn-edit" data-edit-slide="${i}">✏️ Editar</button>
              <button class="btn-download" data-dl-slide="${i}">⬇️ PNG</button>
            </div>
          </div>
        `;
      }).join('');

      const stage = document.getElementById('modal-full-stage');
      const cover = document.getElementById('modal-cover-stage');
      stage.querySelector('.gallery').innerHTML = galleryHtml;
      document.getElementById('modal-caption').textContent = carousel.caption || '';

      cover.style.display = 'none';
      stage.style.display = 'block';

      const copyBtn = stage.querySelector('[data-copy-caption]');
      copyBtn.addEventListener('click', () => {
        navigator.clipboard.writeText(carousel.caption || '').then(() => {
          copyBtn.textContent = 'Copiado ✓';
          setTimeout(() => { copyBtn.textContent = 'Copiar caption'; }, 1500);
        });
      });

      stage.querySelectorAll('[data-edit-slide]').forEach(btn => {
        btn.addEventListener('click', () => {
          const idx = parseInt(btn.dataset.editSlide, 10);
          openEditor(date, item, carouselNum, slides[idx], idx + 1, total);
        });
      });
      stage.querySelectorAll('[data-dl-slide]').forEach(btn => {
        btn.addEventListener('click', () => {
          const idx = parseInt(btn.dataset.dlSlide, 10);
          downloadSlide(date, item, carouselNum, slides[idx], idx + 1, total);
        });
      });

      // Auto-scale dos iframes nas thumbs (galeria)
      requestAnimationFrame(() => {
        stage.querySelectorAll('.thumb-frame').forEach(frame => {
          const iframe = frame.querySelector('iframe');
          if (!iframe) return;
          const apply = () => { iframe.style.transform = `scale(${frame.clientWidth / 1080})`; };
          apply();
          // re-aplica quando o iframe carregar (caso o reflow mude o card)
          iframe.addEventListener('load', apply, { once: true });
        });
      });
    }

    // ============ EDITOR ============
    function overridesKey(slideKey) { return `ia-radar-ov::${slideKey}`; }
    function getOverrides(slideKey) {
      try { return JSON.parse(localStorage.getItem(overridesKey(slideKey)) || 'null'); }
      catch { return null; }
    }
    function setOverrides(slideKey, ov) { localStorage.setItem(overridesKey(slideKey), JSON.stringify(ov)); }
    function clearOverrides(slideKey) { localStorage.removeItem(overridesKey(slideKey)); }

    function renderSlideDataUrl(carousel, slide, slideNum, total, overrides) {
      const html = window.SlideRenderer.renderSlideHTML(carousel, slide, slideNum, total, overrides);
      return 'data:text/html;charset=utf-8,' + encodeURIComponent(html);
    }

    function openEditor(date, item, carouselNum, slide, slideNum, total) {
      const carousel = item.carousel || {};
      const slideKey = `${date}::c${carouselNum}::s${String(slideNum).padStart(2, '0')}`;
      const stored = getOverrides(slideKey) || { texts: {}, colors: {}, fontSize: 'medium' };

      const v = (k) => stored.texts[k] != null ? stored.texts[k] : (slide[k] != null ? slide[k] : '');
      const c = (k, def) => stored.colors[k] || def;

      const panel = document.getElementById('editor-panel');
      panel.innerHTML = `
        <button class="ed-close" data-ed-close>&times;</button>
        <h3>✏️ Editar Slide ${slideNum} <small style="color:#a1a1aa;font-weight:500;">de ${total}</small></h3>
        <p class="subtitle">${escapeHtml(slide.kind || '')} · alterações ficam salvas neste navegador</p>

        <div class="preview-wrap"><iframe id="ed-preview" sandbox="allow-same-origin"></iframe></div>

        <div class="ed-section">
          <h4>Textos</h4>
          <div class="ed-field"><label>Eyebrow (topo pequeno)</label><input type="text" data-edf="eyebrow" value="${escapeHtml(v('eyebrow'))}" /></div>
          <div class="ed-field"><label>Título</label><textarea data-edf="title">${escapeHtml(v('title'))}</textarea></div>
          <div class="ed-field"><label>Palavra em laranja (highlight)</label><input type="text" data-edf="highlight" value="${escapeHtml(v('highlight'))}" /></div>
          <div class="ed-field"><label>Corpo</label><textarea data-edf="body" rows="4">${escapeHtml(v('body'))}</textarea></div>
          <div class="ed-field"><label>Número grande (stat)</label><input type="text" data-edf="stat" value="${escapeHtml(v('stat'))}" /></div>
          <div class="ed-field"><label>Legenda do número</label><input type="text" data-edf="stat_label" value="${escapeHtml(v('stat_label'))}" /></div>
        </div>

        <div class="ed-section">
          <h4>Cores por elemento</h4>
          <div class="color-grid">
            <div class="color-item"><input type="color" data-edc="title" value="${c('title','#fafafa')}" /><label>Título</label></div>
            <div class="color-item"><input type="color" data-edc="body" value="${c('body','#d4d4d8')}" /><label>Corpo</label></div>
            <div class="color-item"><input type="color" data-edc="eyebrow" value="${c('eyebrow','#facc15')}" /><label>Eyebrow</label></div>
            <div class="color-item"><input type="color" data-edc="highlight" value="${c('highlight','#ea580c')}" /><label>Destaque</label></div>
            <div class="color-item"><input type="color" data-edc="stat" value="${c('stat','#facc15')}" /><label>Número</label></div>
            <div class="color-item"><input type="color" data-edc="stat_label" value="${c('stat_label','#fafafa')}" /><label>Legenda nº</label></div>
            <div class="color-item"><input type="color" data-edc="background" value="${c('background','#0a0a0a')}" /><label>Fundo</label></div>
            <div class="color-item"><input type="color" data-edc="theme_tag" value="${c('theme_tag','#22c55e')}" /><label>Tema (capa)</label></div>
          </div>
        </div>

        <div class="ed-section">
          <h4>Tamanho do título</h4>
          <div class="size-grid">
            <button data-edsize="small" class="${stored.fontSize==='small'?'active':''}">Pequeno</button>
            <button data-edsize="medium" class="${(stored.fontSize||'medium')==='medium'?'active':''}">Médio</button>
            <button data-edsize="large" class="${stored.fontSize==='large'?'active':''}">Grande</button>
          </div>
        </div>

        <div class="ed-actions">
          <button class="ed-save" data-ed-save>💾 Salvar no dashboard</button>
          <button class="ed-download-act" data-ed-download>⬇ Baixar PNG</button>
          <button class="ed-reset" data-ed-reset>↺ Resetar pra original</button>
        </div>
      `;
      panel.classList.add('open');

      const state = { texts: { ...stored.texts }, colors: { ...stored.colors }, fontSize: stored.fontSize || 'medium' };

      function refreshPreview() {
        const iframe = document.getElementById('ed-preview');
        const html = window.SlideRenderer.renderSlideHTML(carousel, slide, slideNum, total, state);
        iframe.srcdoc = html;
      }
      function applyPreviewScale() {
        const wrap = panel.querySelector('.preview-wrap');
        const iframe = document.getElementById('ed-preview');
        if (!wrap || !iframe) return;
        iframe.style.transform = `scale(${wrap.clientWidth / 1080})`;
      }
      refreshPreview();
      requestAnimationFrame(applyPreviewScale);
      window.addEventListener('resize', applyPreviewScale);

      panel.querySelectorAll('[data-edf]').forEach(inp => {
        inp.addEventListener('input', () => {
          state.texts[inp.dataset.edf] = inp.value;
          refreshPreview();
        });
      });
      panel.querySelectorAll('[data-edc]').forEach(inp => {
        inp.addEventListener('input', () => {
          state.colors[inp.dataset.edc] = inp.value;
          refreshPreview();
        });
      });
      panel.querySelectorAll('[data-edsize]').forEach(btn => {
        btn.addEventListener('click', () => {
          state.fontSize = btn.dataset.edsize;
          panel.querySelectorAll('[data-edsize]').forEach(b => b.classList.toggle('active', b === btn));
          refreshPreview();
        });
      });

      panel.querySelector('[data-ed-close]').addEventListener('click', () => panel.classList.remove('open'));
      panel.querySelector('[data-ed-save]').addEventListener('click', () => {
        setOverrides(slideKey, state);
        panel.classList.remove('open');
        revealFull(date, item, carouselNum);
      });
      panel.querySelector('[data-ed-reset]').addEventListener('click', () => {
        if (!confirm('Resetar este slide pra versão original?')) return;
        clearOverrides(slideKey);
        panel.classList.remove('open');
        revealFull(date, item, carouselNum);
      });
      panel.querySelector('[data-ed-download]').addEventListener('click', async () => {
        await downloadSlideFromState(carousel, slide, slideNum, total, state, slideKey);
      });
    }

    async function downloadSlide(date, item, carouselNum, slide, slideNum, total) {
      const slideKey = `${date}::c${carouselNum}::s${String(slideNum).padStart(2, '0')}`;
      const overrides = getOverrides(slideKey);
      if (!overrides) {
        // Original: já existe como PNG, baixa direto
        const url = `data/carrosseis/${date}/c${carouselNum}-s${String(slideNum).padStart(2, '0')}.png`;
        const a = document.createElement('a');
        a.href = url;
        a.download = `ia-radar-${date}-c${carouselNum}-s${String(slideNum).padStart(2, '0')}.png`;
        document.body.appendChild(a); a.click(); a.remove();
        return;
      }
      await downloadSlideFromState(item.carousel, slide, slideNum, total, overrides, slideKey);
    }

    async function downloadSlideFromState(carousel, slide, slideNum, total, state, slideKey) {
      // Renderiza HTML em iframe oculto 1080x1350, captura via html2canvas
      const html = window.SlideRenderer.renderSlideHTML(carousel, slide, slideNum, total, state);
      const iframe = document.createElement('iframe');
      iframe.style.position = 'fixed';
      iframe.style.top = '-99999px';
      iframe.style.left = '-99999px';
      iframe.style.width = '1080px';
      iframe.style.height = '1350px';
      iframe.style.border = 'none';
      document.body.appendChild(iframe);
      iframe.srcdoc = html;
      await new Promise(r => iframe.addEventListener('load', r, { once: true }));
      try { await iframe.contentDocument.fonts.ready; } catch {}
      await new Promise(r => setTimeout(r, 600));
      try {
        const canvas = await window.html2canvas(iframe.contentDocument.body, {
          width: 1080, height: 1350,
          windowWidth: 1080, windowHeight: 1350,
          useCORS: true, backgroundColor: null, scale: 1,
        });
        canvas.toBlob(blob => {
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `ia-radar-${slideKey.replace(/::/g, '-')}.png`;
          document.body.appendChild(a); a.click(); a.remove();
          setTimeout(() => URL.revokeObjectURL(url), 1000);
        }, 'image/png');
      } catch (e) {
        alert('Erro ao gerar PNG: ' + e.message);
      } finally {
        iframe.remove();
      }
    }

    function closeModal() {
      const modal = document.getElementById('modal');
      modal.classList.remove('open');
      modal.innerHTML = '';
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });

    // ============ PESQUISA POR NICHO ============
    const searchForm = document.getElementById('searchForm');
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const searchStatus = document.getElementById('searchStatus');

    function showSearchStatus(html, isError = false) {
      searchStatus.innerHTML = html;
      searchStatus.style.display = '';
      searchStatus.classList.toggle('error', isError);
    }
    function hideSearchStatus() {
      searchStatus.style.display = 'none';
      searchStatus.innerHTML = '';
      searchStatus.classList.remove('error');
    }

    searchForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const topic = searchInput.value.trim();
      if (topic.length < 3) {
        showSearchStatus('⚠️ Tópico precisa ter pelo menos 3 caracteres', true);
        return;
      }
      searchBtn.disabled = true;
      searchBtn.textContent = 'Enfileirando...';
      showSearchStatus(`⏳ Enfileirando pesquisa sobre <strong>${escapeHtml(topic)}</strong>…`);

      try {
        const r = await fetch(`${WORKER_URL}/search`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ topic }),
        });
        const data = await r.json();
        if (!r.ok) throw new Error(data.error || `HTTP ${r.status}`);

        searchBtn.textContent = 'Pesquisando...';
        showSearchStatus(`🔄 Pesquisa enfileirada (id <code>${data.id.slice(0,8)}</code>). Aguardando resultado <strong>${data.key}</strong>. ETA ~${data.eta_minutes} min. Pode fechar a aba — o resultado fica salvo no dashboard.`);

        if (STATE.polling) clearInterval(STATE.polling);
        STATE.polling = setInterval(async () => {
          try {
            const test = await fetch(`data/${data.key}.json?_=` + Date.now(), { method: 'HEAD' });
            if (test.ok) {
              clearInterval(STATE.polling); STATE.polling = null;
              showSearchStatus(`✅ Pronto! Carregando aba <strong>${data.key}</strong>…`);
              setTimeout(() => {
                hideSearchStatus();
                searchBtn.disabled = false;
                searchBtn.textContent = 'Pesquisar';
                searchInput.value = '';
                loadIndex(data.key);
              }, 1200);
            }
          } catch { /* segue tentando */ }
        }, 30000);
      } catch (err) {
        searchBtn.disabled = false;
        searchBtn.textContent = 'Pesquisar';
        showSearchStatus(`❌ Erro: ${err.message}. Tenta de novo em alguns minutos.`, true);
      }
    });

    loadIndex();
  </script>
</body>
</html>
